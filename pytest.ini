[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery paths
testpaths =
    tests
    ml
    agent
    services
    nlp

addopts = -v --tb=short -ra

# Markers
markers =
    unit: Unit tests — no external dependencies
    integration: Integration tests — require Docker services
    contract: Contract tests — verify inter-service schemas
    property: Property-based tests using hypothesis
    infrastructure: Tests requiring external infrastructure
    slow: Tests that take longer to run

# Async support
asyncio_mode = auto

# Ignore dirs
norecursedirs =
    .git
    .venv
    venv
    __pycache__
    *.egg-info
    node_modules
    .tox
    build
    dist
